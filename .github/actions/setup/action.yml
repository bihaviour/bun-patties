name: Setup Bun + install
description: Install Bun pinned by .bun-version and run bun install --frozen-lockfile. Caller must run actions/checkout first.

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version-file: .bun-version

    - name: Cache Bun install
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    # GitHub runners have no global git identity; the create-patties `--git`
    # tests (and the scaffolder itself) run `git commit` in temp repos, which
    # otherwise fails with exit 128 ("tell me who you are").
    - name: Configure git identity
      shell: bash
      run: |
        git config --global user.email "ci@patties.dev"
        git config --global user.name "patties CI"
