name: Release

# Two ways in:
#   1. Automatically, after the CI workflow on master finishes successfully —
#      so a broken master can never publish and we don't re-run the validate
#      gate CI already covered.
#   2. Manually, via "Run workflow" on the master branch (workflow_dispatch).
#      Merging the changesets "Version Packages" PR is a commit authored by
#      github-actions[bot]; GitHub does not always spawn a downstream `push`
#      CI run for it, which would leave the auto path (1) un-triggered. The
#      manual button is the reliable fallback: it runs `changeset publish`
#      against the current master tip. Publishing is idempotent — only
#      packages whose version is ahead of npm are published — so a manual run
#      with nothing to release is a safe no-op.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Changesets-driven release:
  #
  # When there are pending `.changeset/*.md` files, this opens (or updates)
  # a "Version Packages" PR that bumps versions and rewrites CHANGELOG.md.
  #
  # When that PR is merged into master, this job instead runs
  # `changeset publish` — which publishes any package whose version is ahead
  # of npm, creates git tags, and (because `createGithubReleases: true`) opens
  # a GitHub Release per published package with notes from CHANGELOG.md.
  # ---------------------------------------------------------------------------
  release:
    name: changesets / release
    runs-on: ubuntu-latest
    # Disable Husky in CI: the changesets "Version Packages" commit would
    # otherwise fire .husky/pre-commit (`bun test`), running the full
    # integration suite inside the release job. Those server/HTTP tests fail
    # in the sandbox and dump giant Response object graphs, blowing the run
    # past the job timeout. Hooks have no business gating an automated commit.
    env:
      HUSKY: 0
    # Run on a manual dispatch from master, or when the triggering CI workflow
    # succeeded **and** it was the push-to-master variant. PR-triggered CI runs
    # never publish.
    if: >-
      ( github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/master' ) ||
      ( github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master' )
    permissions:
      contents: write       # bump versions, push tags, create releases
      pull-requests: write  # open the Version Packages PR
      id-token: write       # npm provenance attestations
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      # On the auto path, check out the exact SHA CI just validated (not the
      # latest tip), so we publish what was actually tested. On a manual
      # dispatch there is no triggering run, so fall back to the master tip.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: ./.github/actions/setup

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - name: Create Version PR or publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          # The guard refuses to publish a prerelease version unless the repo
          # is in changesets pre mode, so a stray prerelease can never take the
          # npm `latest` tag. See scripts/check-release-tag.ts.
          # Must be SINGLE commands: changesets/action splits these on
          # whitespace and execs without a shell, so a top-level `&&` is NOT a
          # shell operator — it would be passed as args to the first command
          # and the publish half would silently never run. The `&&` guard lives
          # inside the package.json `release` script, which bun runs via a shell.
          publish: bun run release
          version: bun run version
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summarise published packages
        if: success() && steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          {
            echo "## Released"
            echo ""
            echo "\`\`\`json"
            echo "$PUBLISHED"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Surface release failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          {
            echo "## Release failed"
            echo ""
            echo "**SHA:** \`$HEAD_SHA\`"
            echo ""
            echo "- Release run: $RUN_URL"
            echo "- Triggering CI run: $CI_RUN_URL"
            echo ""
            echo "### Common causes"
            echo ""
            echo "- \`NPM_TOKEN\` repo secret missing, expired, or not an automation token (2FA blocks publish-type tokens)."
            echo "- Package name unavailable or maintainer rights missing on npm."
            echo "- \`createGithubReleases: true\` requires \`contents: write\` permission — already set, but verify in repo Settings → Actions → General."
            echo "- A version already published at that semver — \`npm view <pkg> versions\` to confirm."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
