name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request'
        && format('{0}-pr-{1}', github.workflow, github.ref_name)
        || format('{0}-sha-{1}', github.workflow, github.sha) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # framework / — change detection + build artifact shared by downstream jobs
  # ---------------------------------------------------------------------------
  changes:
    name: framework / changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs-only: ${{ steps.detect.outputs.docs-only }}
      adapters-touched: ${{ steps.detect.outputs.adapters-touched }}
      plugins-touched: ${{ steps.detect.outputs.plugins-touched }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - id: detect
        run: bun run scripts/ci-changes.ts

  build:
    name: framework / build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs-only != 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - run: bun --filter patties generate:agents-md
      - name: Build
        run: |
          mkdir -p dist
          bun --version > dist/.bun-version
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-output
          path: |
            dist/
            packages/patties/CLAUDE.md
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # quality / — static analysis on the framework source
  # ---------------------------------------------------------------------------
  lint:
    name: quality / lint
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - run: bun run lint

  typecheck:
    name: quality / typecheck
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  # ---------------------------------------------------------------------------
  # tests / — unit, integration, adapter, and plugin suites
  # ---------------------------------------------------------------------------
  test-unit:
    name: tests / unit
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - name: Run unit tests
        working-directory: packages/patties
        run: |
          bun test \
            tests/filesystem.test.ts \
            tests/middleware.test.ts \
            tests/render.test.tsx \
            tests/router.test.ts \
            tests/server.test.ts \
            tests/agents-md \
            tests/ai \
            tests/cli \
            tests/config \
            tests/plugin \
            tests/router
      - name: Run create-patties tests
        working-directory: packages/create-patties
        run: bun test

  test-integration:
    name: tests / integration
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - working-directory: packages/patties
        run: bun test tests/integration tests/dev

  test-adapters:
    name: tests / adapters (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # TODO: re-enable workerd, deno, vercel-edge, netlify-edge once the
        # adapter smoke harness reliably boots their runtimes on CI (currently
        # times out waiting for the spawned server on 127.0.0.1).
        adapter: [bun]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output
      - name: Install runtime (workerd)
        if: matrix.adapter == 'workerd' || matrix.adapter == 'vercel-edge'
        run: bun run scripts/install-runtime-workerd.ts
      - name: Install runtime (deno)
        if: matrix.adapter == 'deno' || matrix.adapter == 'netlify-edge'
        run: bun run scripts/install-runtime-deno.ts
      - name: Smoke
        working-directory: packages/patties
        env:
          ADAPTER: ${{ matrix.adapter }}
        run: bun test "tests/adapters/$ADAPTER"

  test-plugins:
    name: tests / plugins
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.plugins-touched == 'true' || github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - name: Plugin smoke
        working-directory: packages/patties
        run: bun test tests/plugin

  # ---------------------------------------------------------------------------
  # docs / — agent manifest drift + docs link integrity
  # ---------------------------------------------------------------------------
  check-agents-md:
    name: docs / agents-md
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - run: bun --filter patties generate:agents-md
      - run: git diff --exit-code packages/patties/CLAUDE.md

  docs-link-check:
    name: docs / link-check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs-only == 'true' || github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup
      - run: bun run scripts/check-docs-links.ts

  # ---------------------------------------------------------------------------
  # gate / — single required check that aggregates everything above
  # ---------------------------------------------------------------------------
  ci-pass:
    name: gate / ci-pass
    runs-on: ubuntu-latest
    needs:
      - changes
      - build
      - lint
      - typecheck
      - test-unit
      - test-integration
      - test-adapters
      - test-plugins
      - check-agents-md
      - docs-link-check
    if: always()
    permissions:
      contents: read
    steps:
      - name: Aggregate
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          if printf '%s' "$NEEDS_JSON" | grep -E '"result": "(failure|cancelled)"' >/dev/null; then
            echo "One or more required checks failed or were cancelled."
            exit 1
          fi
          echo "All required checks passed (or were correctly skipped)."
